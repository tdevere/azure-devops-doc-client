name: test-request

on:
  issues:
    types: [labeled]
  repository_dispatch:
    types: [run-test-batch]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-test:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' && github.event.label.name == 'test-request') ||
      github.event_name == 'repository_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Determine operation IDs
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          DISPATCH_OPS: ${{ github.event.client_payload.ops || '' }}
          DISPATCH_BATCH: ${{ github.event.client_payload.batch || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p tmp

          if [ -n "$DISPATCH_OPS" ]; then
            # Triggered by repository_dispatch — ops provided directly
            OPS_LINE="$DISPATCH_OPS"
            ISSUE_NUM="dispatch-${DISPATCH_BATCH:-auto}"
            echo "source=dispatch" >> "$GITHUB_OUTPUT"
          else
            # Triggered by issue label — parse from issue body
            ALL_TEXT="$ISSUE_TITLE $ISSUE_BODY"
            OPS=$(echo "$ALL_TEXT" | grep -oP '(services|server)\.[a-z0-9._-]+\.[a-z0-9._-]+\.[a-z0-9._-]+' | sort -u)

            if [ -z "$OPS" ]; then
              gh issue comment ${{ github.event.issue.number }} \
                --body "⚠️ Could not find any operation IDs in this issue."
              exit 0
            fi

            OPS_LINE=$(echo "$OPS" | tr '\n' ' ' | xargs)
            ISSUE_NUM="${{ github.event.issue.number }}"
            echo "source=issue" >> "$GITHUB_OUTPUT"
          fi

          echo "ops=$OPS_LINE" >> "$GITHUB_OUTPUT"
          echo "issue_num=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$OPS_LINE" | wc -w)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Validate operations exist in catalog
        if: steps.parse.outputs.ops != ''
        id: validate
        run: |
          mkdir -p tmp
          node --input-type=module -e "
          import { getOperationById } from './dist/index.js';
          const ops = process.argv.slice(1);
          const valid = [], invalid = [];
          for (const op of ops) {
            try { getOperationById(op); valid.push(op); }
            catch { invalid.push(op); }
          }
          console.log('VALID=' + valid.join(' '));
          console.log('INVALID=' + invalid.join(' '));
          " ${{ steps.parse.outputs.ops }} > tmp/validate.txt

          VALID_OPS=$(grep '^VALID=' tmp/validate.txt | sed 's/^VALID=//')
          INVALID_OPS=$(grep '^INVALID=' tmp/validate.txt | sed 's/^INVALID=//')

          echo "valid=$VALID_OPS" >> "$GITHUB_OUTPUT"
          echo "invalid=$INVALID_OPS" >> "$GITHUB_OUTPUT"

      - name: Generate test code
        if: steps.validate.outputs.valid != ''
        id: generate
        run: |
          node scripts/gen-test.mjs ${{ steps.parse.outputs.issue_num }} ${{ steps.validate.outputs.valid }}

      - name: Run the generated tests
        if: steps.validate.outputs.valid != ''
        id: run_tests
        env:
          RUN_LIVE_AZDO_TESTS: "true"
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
          AZDO_ORGANIZATION: ${{ secrets.AZDO_ORGANIZATION }}
        run: |
          npx vitest run "tests/issue-${{ steps.parse.outputs.issue_num }}.test.ts" --reporter=verbose 2>&1 | tee tmp/test-output.txt || true
          if grep -q "Tests.*passed" tmp/test-output.txt; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit tests to master
        if: steps.validate.outputs.valid != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "tests/issue-${{ steps.parse.outputs.issue_num }}.test.ts"
          git commit -m "test: add API tests for batch ${{ steps.parse.outputs.issue_num }}"
          git push origin master

      - name: Comment on issue and close
        if: steps.validate.outputs.valid != '' && steps.parse.outputs.source == 'issue'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT="${{ steps.run_tests.outputs.result }}"
          OPS="${{ steps.validate.outputs.valid }}"

          if [ "$RESULT" = "pass" ]; then
            BODY="✅ Tests generated and **all passed** against the live API. Committed to master."
          else
            BODY="⚠️ Tests generated but some **failed** against the live API. Committed — failures may indicate API issues or missing permissions."
          fi

          BODY="$BODY

          **Operations tested:** $(echo "$OPS" | tr ' ' '\n' | sed 's/^/\`/' | sed 's/$/\`/' | tr '\n' ', ' | sed 's/,$//')"

          gh issue comment ${{ github.event.issue.number }} --body "$BODY"
          gh issue close ${{ github.event.issue.number }}

      - name: Dispatch next batch
        if: steps.validate.outputs.valid != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pick next untested operations
          NEXT_OPS=$(node scripts/pick-next-batch.mjs 20 2>/dev/null | tr '\n' ' ' | xargs)
          COUNT=$(echo "$NEXT_OPS" | wc -w)

          if [ "$COUNT" -eq 0 ] || [ -z "$NEXT_OPS" ]; then
            echo "No more untested operations — coverage complete!"
            exit 0
          fi

          # Increment batch number
          CURRENT_BATCH="${{ steps.parse.outputs.issue_num }}"
          if echo "$CURRENT_BATCH" | grep -q '^dispatch-'; then
            NUM=$(echo "$CURRENT_BATCH" | sed 's/dispatch-//')
            BATCH=$((NUM + 1))
          else
            BATCH=$((CURRENT_BATCH + 1))
          fi

          echo "Dispatching batch $BATCH with $COUNT ops..."
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            --field event_type=run-test-batch \
            -f client_payload[ops]="$NEXT_OPS" \
            -f client_payload[batch]="$BATCH"
