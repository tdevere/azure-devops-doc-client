name: fix-failures

on:
  issues:
    types: [labeled, opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  triage-and-fix:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'api-test-failure')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Triage failures
        id: triage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p tmp
          node scripts/triage-failures.mjs --issue ${{ github.event.issue.number }} | tee tmp/triage-output.txt

          # Check if known-failures.json was actually updated
          if git diff --quiet src/known-failures.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new failures to classify."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            ADDED=$(git diff src/known-failures.json | grep '^+.*"reason"' | wc -l)
            echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          fi

      - name: Create fix PR
        if: steps.triage.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="fix-failures/${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add src/known-failures.json
          git commit -m "fix: classify ${{ steps.triage.outputs.added }} API failures from issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"

          # Close existing PR if re-running
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            gh pr close "$EXISTING_PR" --delete-branch 2>/dev/null || true
          fi

          gh pr create \
            --title "fix: classify API failures from issue #${{ github.event.issue.number }}" \
            --body "## Failure Triage

          Updates \`src/known-failures.json\` with classified failures from #${{ github.event.issue.number }}.

          Once merged, the test runner will skip documented failures and only report truly unexpected ones.

          ### Triage Output
          \`\`\`
          $(cat tmp/triage-output.txt)
          \`\`\`

          ---
          *Auto-generated by fix-failures workflow*" \
            --label "automated" \
            --head "$BRANCH"

          # Enable auto-merge so CI gate is the only check
          gh pr merge "$BRANCH" --auto --squash

      - name: Comment on issue
        if: steps.triage.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🔧 **Triage complete** — classified ${{ steps.triage.outputs.added }} new failure(s) in \`known-failures.json\`. PR opened and set to auto-merge.

          Once merged, the next api-test run will skip these documented failures and the automation loop will continue."

      - name: Comment no changes needed
        if: steps.triage.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ **Triage complete** — all failures in this issue are already documented in \`known-failures.json\`. No changes needed."

          gh issue close ${{ github.event.issue.number }}
