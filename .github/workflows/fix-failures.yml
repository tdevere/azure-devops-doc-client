name: fix-failures

on:
  issues:
    types: [labeled, opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  triage-and-fix:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'api-test-failure')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Triage failures
        id: triage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p tmp
          node scripts/triage-failures.mjs --issue ${{ github.event.issue.number }} | tee tmp/triage-output.txt

          # Check if known-failures.json was actually updated
          if git diff --quiet src/known-failures.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new failures to classify."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            ADDED=$(git diff src/known-failures.json | grep '^+.*"reason"' | wc -l)
            echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit fix directly to master
        if: steps.triage.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/known-failures.json
          git commit -m "fix: classify ${{ steps.triage.outputs.added }} API failures from issue #${{ github.event.issue.number }}"
          git push origin master

      - name: Comment on issue
        if: steps.triage.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🔧 **Triage complete** — classified ${{ steps.triage.outputs.added }} new failure(s) in \`known-failures.json\` and committed directly.

          The test runner will now skip these documented failures. Next api-test run will show cleaner results.

          \`\`\`
          $(cat tmp/triage-output.txt)
          \`\`\`"

          gh issue close ${{ github.event.issue.number }}

      - name: Comment no changes needed
        if: steps.triage.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ **Triage complete** — all failures in this issue are already documented in \`known-failures.json\`. No changes needed."

          gh issue close ${{ github.event.issue.number }}

      - name: Re-run api-test with updated known-failures
        if: steps.triage.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run api-test.yml
