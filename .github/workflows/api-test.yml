name: api-test

on:
  # Run on demand
  workflow_dispatch:
    inputs:
      pattern:
        description: 'Operation pattern to test (e.g., "services.git.*")'
        required: false
        default: ""
      service:
        description: "Service filter (e.g., git, build, core)"
        required: false
        default: ""
      verbose:
        description: "Show per-operation results"
        type: boolean
        default: false

  # Triggered by fix-failures workflow after classifying errors
  repository_dispatch:
    types: [retest-api]

  # Run weekly for regression detection
  schedule:
    - cron: "0 6 * * 1" # Monday 6 AM UTC

permissions:
  contents: read
  issues: write

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run API tests
        id: test
        env:
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
          AZDO_ORGANIZATION: ${{ secrets.AZDO_ORGANIZATION }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.pattern }}" ]; then
            ARGS="$ARGS ${{ inputs.pattern }}"
          fi
          if [ -n "${{ inputs.service }}" ]; then
            ARGS="$ARGS --service ${{ inputs.service }}"
          fi

          # Run and let the script write tmp/api-test-results.json automatically
          node scripts/test-api.mjs $ARGS || true

          # Extract counts from the results file
          PASS=$(jq '.pass // 0' tmp/api-test-results.json)
          FAIL=$(jq '.fail // 0' tmp/api-test-results.json)
          SERVER_ERR=$(jq '.serverError // 0' tmp/api-test-results.json)
          TOTAL=$(jq '.totalTested // 0' tmp/api-test-results.json)

          echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
          echo "server_err=$SERVER_ERR" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: tmp/api-test-results.json

      - name: File issue on failures
        if: steps.test.outputs.fail != '0' || steps.test.outputs.server_err != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAIL=${{ steps.test.outputs.fail }}
          SERVER_ERR=${{ steps.test.outputs.server_err }}
          PASS=${{ steps.test.outputs.pass }}
          TOTAL=${{ steps.test.outputs.total }}
          DATE=$(date -u '+%Y-%m-%d')

          # Build the failed operations list
          FAILED_OPS=$(jq -r '.results[] | select(.status == "fail" or .status == "server-error") | "- `\(.id)` — \(.status): \(.detail // "unknown")"' tmp/api-test-results.json)

          BODY=$(cat <<EOF
          ## API Test Failures — $DATE

          | Metric | Value |
          |--------|-------|
          | Total tested | $TOTAL |
          | Passed | $PASS |
          | Failed | $FAIL |
          | Server errors | $SERVER_ERR |

          ### Failed Operations

          $FAILED_OPS

          ### Workflow Run

          [View Run](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)

          ---
          *Auto-generated by api-test workflow*
          EOF
          )

          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list --label "api-test-failure" --state open --limit 1 --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create \
              --title "🔴 API Test Failures — $DATE ($FAIL failed, $SERVER_ERR server errors)" \
              --body "$BODY" \
              --label "api-test-failure,automated"
            echo "Created new issue"
          fi

      - name: Fail if real errors
        if: steps.test.outputs.fail != '0' || steps.test.outputs.server_err != '0'
        run: exit 1
